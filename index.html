<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    .sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
    .nav-section-label { color: #0087E6; font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; padding: 12px 20px 4px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer; color: #FFFFFF; font-size: 13px; transition: background 0.15s; border-left: 3px solid transparent; }

    .nav-item.active { background: rgba(0,135,230,0.25); border-left-color: #0087E6; color: #FFFFFF; font-weight: 600; }

    .user-avatar { width: 30px; height: 30px; border-radius: 50%; background: #F2C94C; color: #001B5E; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; }
    .page-area { flex: 1; padding: 28px; overflow-y: auto; background: #f4f6f9; }

    /* Section divider */
    .section-divider { background: #001B5E; color: #FFFFFF; padding: 8px 16px; font-size: 12px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; border-radius: 4px 4px 0 0; display: flex; align-items: center; justify-content: space-between; }

    .badge-revenue { background: #fff8e6; color: #b8860b; border: 1px solid #f2c94c; }

    .form-group { margin-bottom: 18px; }

    .checkbox-group:hover { border-color: #0087E6; background: #f5f8ff; }
    .checkbox-group input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: #0087E6; }
    .checkbox-group label { font-size: 13px; color: #2F3A4A; cursor: pointer; }

    .inline-num { padding: 6px 10px; border: 1.5px solid #d1d9e0; border-radius: 5px; font-size: 13px; color: #2F3A4A; outline: none; transition: border-color 0.15s; text-align: right; }
    .inline-num:focus { border-color: #0087E6; box-shadow: 0 0 0 3px rgba(0,135,230,0.1); }

    /* Metric cards */
    .metrics-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .metric-card { background: #FFFFFF; border-radius: 6px; padding: 16px 20px; flex: 1; min-width: 140px; box-shadow: 0 2px 6px rgba(0,0,0,0.07); border-top: 3px solid #0087E6; }
    .metric-card.yellow { border-top-color: #F2C94C; }
    .metric-card .metric-label { font-size: 11px; font-weight: 700; color: #6b7a8d; text-transform: uppercase; letter-spacing: 0.6px; }
    .metric-card .metric-value { font-size: 28px; font-weight: 700; color: #001B5E; line-height: 1.2; margin-top: 4px; }
    .metric-card .metric-sub { font-size: 11px; color: #6b7a8d; margin-top: 2px; }

    /* Search bar */
    .search-bar { position: relative; }
    .search-bar input { padding: 8px 12px 8px 34px; border: 1.5px solid #d1d9e0; border-radius: 5px; font-size: 13px; color: #2F3A4A; outline: none; width: 220px; }
    .search-bar input:focus { border-color: #0087E6; }
    .search-bar .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #9aaab8; font-size: 14px; }

    /* Coming soon placeholder */
    .coming-soon { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 32px; gap: 12px; text-align: center; }
    .coming-soon .cs-icon { font-size: 52px; opacity: 0.2; }
    .coming-soon h3 { color: #001B5E; font-size: 18px; }
    .coming-soon p { color: #6b7a8d; font-size: 13px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f0f4f8; }
    ::-webkit-scrollbar-thumb { background: #c5cfe0; border-radius: 3px; }
  </style>
</head>

const INITIAL_COST_CENTRES = [

const INITIAL_BUDGET_ITEMS = [
  { id: 'bi1',  name: 'Staff in Service Training',    costPerHeadcount: 0 },
  { id: 'bi2',  name: 'Staff Welfare',                costPerHeadcount: 0 },
  { id: 'bi3',  name: 'Team Building',                costPerHeadcount: 0 },
  { id: 'bi4',  name: 'Dental Subsidy',               costPerHeadcount: 0 },
  { id: 'bi5',  name: 'Medical Outpatient',            costPerHeadcount: 0 },
  { id: 'bi6',  name: 'Medical Inpatient',             costPerHeadcount: 0 },
  { id: 'bi7',  name: 'Socks Allowances',              costPerHeadcount: 0 },
  { id: 'bi8',  name: 'Softphone Subscription',        costPerHeadcount: 0 },
  { id: 'bi9',  name: 'Telecommunications Subsidy',    costPerHeadcount: 0 },
  { id: 'bi10', name: 'Transport Claims',              costPerHeadcount: 0 },
  { id: 'bi11', name: 'Pat on the Back (All Other)',   costPerHeadcount: 0 },
  { id: 'bi12', name: 'Pat on the Back (CPD)',         costPerHeadcount: 0 },
  { id: 'bi13', name: 'Pat on the Back (I&I)',         costPerHeadcount: 0 },
];

// ─── Nav Config ───────────────────────────────────────────────────────────────
const NAV = [
  { section: 'Overview', items: [
    { key: 'dashboard',         label: 'Dashboard',           icon: '📊' },
  ]},
  { section: 'Administration', items: [
    { key: 'cost-centre',       label: 'Cost Centre',         icon: '🏢', badge: 'FIN',  badgeStyle: { background:'rgba(0,135,230,0.2)', color:'#0087E6' } },
    { key: 'headcount',         label: 'Headcount',           icon: '👤' },
    { key: 'employees',         label: 'Employees',           icon: '👥', badge: 'HR',   badgeStyle: { background:'rgba(242,201,76,0.2)', color:'#F2C94C' } },
    { key: 'branches',          label: 'Branches',            icon: '🏦', badge: 'BR',   badgeStyle: { background:'rgba(255,255,255,0.15)', color:'rgba(255,255,255,0.7)' } },
  ]},

    { key: 'budget-assumption', label: 'Budget Assumption',   icon: '📐', badge: 'F+HR', badgeStyle: { background:'rgba(0,135,230,0.2)', color:'#88ccff' } },
    { key: 'budget-plan',       label: 'Budget Plan',         icon: '📋' },
    { key: 'allocations',       label: 'Allocations',         icon: '💰' },
    { key: 'reports',           label: 'Reports',             icon: '📈' },
  ]},
];

const ROLE_LABELS   = { finance: 'Finance Rep', hr: 'HR Rep', branch: 'Branch Rep' };
const ROLE_INITIALS = { finance: 'FR', hr: 'HR', branch: 'BR' };

// ─── Helpers ──────────────────────────────────────────────────────────────────
function TypeBadge({ type }) {
  const cls = { Admin: 'badge-admin', Revenue: 'badge-revenue', Preventive: 'badge-preventive' }[type] || 'badge-admin';
  return <span className={`badge ${cls}`}>{type}</span>;
}

function DivTag({ division }) {
  return (
    <span style={{background:'#f0f4ff', color:'#001B5E', fontSize:11, fontWeight:700, padding:'3px 10px', borderRadius:12, border:'1px solid #cdd8f0', letterSpacing:0.4}}>
      {division}
    </span>
  );
}

function fmtMoney(n) {
  if (n === 0) return '—';
  return '$' + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ─── Modal: Create / Edit Cost Centre ─────────────────────────────────────────
function CostCentreModal({ initial, onSave, onClose, existingIds }) {
  const isEdit = !!initial;
  const [form, setForm] = useState(initial || { id:'', name:'', division: DIVISIONS[0], type: TYPES[0], requiresHeadcount: false });
  const [errors, setErrors] = useState({});

  const set = (field, val) => { setForm(f => ({...f, [field]: val})); setErrors(e => ({...e, [field]: ''})); };

  const validate = () => {
    const e = {};
    if (!form.id.trim()) e.id = 'Cost Centre code is required';
    else if (!/^\d{6}$/.test(form.id.trim())) e.id = 'Must be a 6-digit number';
    else if (!isEdit && existingIds.includes(form.id.trim())) e.id = 'This code already exists';
    if (!form.name.trim()) e.name = 'Name is required';
    return e;
  };

  const handleSave = () => {
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    onSave({ ...form, id: form.id.trim(), name: form.name.trim() });
  };

  return (
    <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div>
            <h3>{isEdit ? 'Edit Cost Centre' : 'Create New Cost Centre'}</h3>
            <div className="accent-line" />
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-group">
            <label className="form-label">Cost Centre Code <span className="required">*</span></label>
            <input className={`form-control ${errors.id ? 'error' : ''}`} placeholder="e.g. 100120"
              value={form.id} onChange={e => set('id', e.target.value)} disabled={isEdit} maxLength={6} />
            {errors.id && <div className="form-error">{errors.id}</div>}
          </div>
          <div className="form-group">
            <label className="form-label">Name <span className="required">*</span></label>
            <input className={`form-control ${errors.name ? 'error' : ''}`} placeholder="e.g. Operations"
              value={form.name} onChange={e => set('name', e.target.value)} />
            {errors.name && <div className="form-error">{errors.name}</div>}
          </div>
          <div className="form-group">
            <label className="form-label">Division <span className="required">*</span></label>
            <select className="form-control" value={form.division} onChange={e => set('division', e.target.value)}>
              {DIVISIONS.map(d => <option key={d} value={d}>{d}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Type <span className="required">*</span></label>
            <select className="form-control" value={form.type} onChange={e => set('type', e.target.value)}>
              {TYPES.map(t => <option key={t} value={t}>{t}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Requires Headcount</label>
            <div className="checkbox-group" onClick={() => set('requiresHeadcount', !form.requiresHeadcount)}>
              <input type="checkbox" checked={form.requiresHeadcount}
                onChange={() => set('requiresHeadcount', !form.requiresHeadcount)}
                onClick={e => e.stopPropagation()} />
              <label>{form.requiresHeadcount ? 'Yes — headcount required for this cost centre' : 'No — headcount not required'}</label>
            </div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-outline" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={handleSave}>
            {isEdit ? '💾 Save Changes' : '✚ Create Cost Centre'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Confirm Delete Modal ──────────────────────────────────────────────────────
function DeleteModal({ title, message, onConfirm, onClose }) {
  return (
    <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{maxWidth: 420}}>
        <div className="modal-header" style={{background:'#b02a37'}}>
          <div>
            <h3>{title}</h3>
            <div className="accent-line" style={{background:'#f5b7b1'}} />
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <p style={{fontSize:14, lineHeight:1.6}} dangerouslySetInnerHTML={{__html: message}} />
        </div>
        <div className="modal-footer">
          <button className="btn btn-outline" onClick={onClose}>Cancel</button>
          <button className="btn btn-danger" onClick={onConfirm}>Delete</button>
        </div>
      </div>
    </div>
  );
}

// ─── Cost Centre Tab ───────────────────────────────────────────────────────────
function CostCentreTab({ role, data, setData }) {
  const [showCreate, setShowCreate] = useState(false);
  const [editTarget, setEditTarget] = useState(null);
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [search, setSearch] = useState('');

  if (role !== 'finance') {

// ─── Modal: Budget Item ────────────────────────────────────────────────────────
function BudgetItemModal({ initial, onSave, onClose, existingNames }) {
  const isEdit = !!initial;
  const [form, setForm] = useState(
    initial ? { name: initial.name, costPerHeadcount: String(initial.costPerHeadcount) }
            : { name: '', costPerHeadcount: '' }
  );
  const [errors, setErrors] = useState({});

  const set = (field, val) => { setForm(f => ({...f, [field]: val})); setErrors(e => ({...e, [field]: ''})); };

  const validate = () => {
    const e = {};
    if (!form.name.trim()) {
      e.name = 'Budget item name is required';
    } else if (!isEdit && existingNames.map(n => n.toLowerCase()).includes(form.name.trim().toLowerCase())) {
      e.name = 'This item already exists';
    }
    const cost = parseFloat(form.costPerHeadcount);
    if (form.costPerHeadcount === '' || isNaN(cost) || cost < 0) e.costPerHeadcount = 'Enter a valid amount (0 or more)';
    return e;
  };

  const handleSave = () => {
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    onSave({ ...(initial || {}), name: form.name.trim(), costPerHeadcount: parseFloat(form.costPerHeadcount) });
  };

  return (
    <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div>
            <h3>{isEdit ? 'Edit Budget Item' : 'Add New Budget Item'}</h3>
            <div className="accent-line" />
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-group">
            <label className="form-label">Budget Item Name <span className="required">*</span></label>
            <input className={`form-control ${errors.name ? 'error' : ''}`}
              placeholder="e.g. Staff Welfare" value={form.name}
              onChange={e => set('name', e.target.value)} />
            {errors.name && <div className="form-error">{errors.name}</div>}
          </div>
          <div className="form-group">
            <label className="form-label">Cost per Headcount ($) <span className="required">*</span></label>
            <input type="number" min="0" step="0.01"
              className={`form-control ${errors.costPerHeadcount ? 'error' : ''}`}
              placeholder="e.g. 150" value={form.costPerHeadcount}
              onChange={e => set('costPerHeadcount', e.target.value)} />
            {errors.costPerHeadcount && <div className="form-error">{errors.costPerHeadcount}</div>}
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-outline" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={handleSave}>
            {isEdit ? '💾 Save Changes' : '✚ Add Budget Item'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [role,         setRole]         = useState('finance');
  const [activeTab,    setActiveTab]    = useState('dashboard');
  const [costCentres,  setCostCentres]  = useState(INITIAL_COST_CENTRES);
  const [headcounts,   setHeadcounts]   = useState({});
  const [budgetItems,  setBudgetItems]  = useState(INITIAL_BUDGET_ITEMS);

  const PAGE_TITLES = {
    'dashboard':          { title: 'Dashboard',           breadcrumb: 'Overview' },
    'cost-centre':        { title: 'Cost Centre',         breadcrumb: 'Administration' },
    'headcount':          { title: 'Headcount',           breadcrumb: 'Administration' },
    'employees':          { title: 'Employees',           breadcrumb: 'Administration' },
    'branches':           { title: 'Branches',            breadcrumb: 'Administration' },
    'item-cost':          { title: 'Cost per Headcount',  breadcrumb: 'Budgeting' },
    'budget-assumption':  { title: 'Budget Assumption',   breadcrumb: 'Budgeting' },
    'budget-plan':        { title: 'Budget Plan',         breadcrumb: 'Budgeting' },
    'allocations':        { title: 'Allocations',         breadcrumb: 'Budgeting' },
    'reports':            { title: 'Reports',             breadcrumb: 'Budgeting' },
  };

  const { title, breadcrumb } = PAGE_TITLES[activeTab] || { title: activeTab, breadcrumb: '' };

  const renderContent = () => {
    switch (activeTab) {
      case 'dashboard':         return <DashboardTab data={costCentres} />;
      case 'cost-centre':       return <CostCentreTab role={role} data={costCentres} setData={setCostCentres} />;
      case 'headcount':         return <HeadcountTab costCentres={costCentres} headcounts={headcounts} setHeadcounts={setHeadcounts} />;
      case 'employees':         return <PlaceholderTab label="Employees" icon="👥" />;
      case 'branches':          return <PlaceholderTab label="Branches" icon="🏦" />;
      case 'item-cost':         return <ItemCostTab role={role} budgetItems={budgetItems} setBudgetItems={setBudgetItems} />;
      case 'budget-assumption': return <BudgetAssumptionTab role={role} costCentres={costCentres} headcounts={headcounts} budgetItems={budgetItems} />;
      case 'budget-plan':       return <PlaceholderTab label="Budget Plan" icon="📋" />;
      case 'allocations':       return <PlaceholderTab label="Allocations" icon="💰" />;
      case 'reports':           return <PlaceholderTab label="Reports" icon="📈" />;
      default:                  return null;
    }
  };

  return (
    <div className="app-wrapper">
      {/* Sidebar */}
      <div className="sidebar">
        <div className="sidebar-logo">
          <h2>Central Budgeting Fund</h2>
          <span>Management System</span>
        </div>
        <nav className="sidebar-nav">
          {NAV.map(section => (
            <div key={section.section}>
              <div className="nav-section-label">{section.section}</div>
              {section.items.map(item => (
                <div
                  key={item.key}
                  className={`nav-item ${activeTab === item.key ? 'active' : ''}`}
                  onClick={() => setActiveTab(item.key)}
                >
                  <span className="nav-icon">{item.icon}</span>
                  <span className="nav-label">{item.label}</span>
                  {item.badge && (
                    <span className="nav-badge" style={item.badgeStyle}>{item.badge}</span>
                  )}
                </div>
              ))}
            </div>
          ))}
        </nav>
        <div className="sidebar-footer">
          <div className="role-badge">
            <label>Active Role</label>
            <select value={role} onChange={e => setRole(e.target.value)}>
              <option value="finance">Finance Rep</option>
              <option value="hr">HR Rep</option>
              <option value="branch">Branch Rep</option>
            </select>
          </div>
        </div>
      </div>

      {/* Main */}
      <div className="main-content">
        <div className="top-bar">
          <div>
            <div className="breadcrumb">{breadcrumb}</div>
            <h1>{title}</h1>
          </div>
          <div className="user-info">
            <div className="user-avatar">{ROLE_INITIALS[role]}</div>
            <span>{ROLE_LABELS[role]}</span>
          </div>
        </div>
        <div className="page-area">
          {renderContent()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
